name: hunt

# Caça a vaga ARM grátis na Oracle. Roda na infra do GitHub (repo PÚBLICO = Actions ilimitado),
# então o notebook pode ficar desligado. Quando conseguir a VM, abre uma ISSUE (você recebe e-mail).
on:
  schedule:
    # De hora em hora (no :13, fora do topo congestionado). NÃO dependemos da pontualidade do
    # GitHub (ele descarta a maioria): cada disparo CAÇA POR ~5,5h, então basta o cron acertar
    # de vez em quando que sempre há um hunt longo em andamento.
    - cron: "13 * * * *"
  workflow_dispatch: {}       # botão "Run workflow" p/ testar na hora

permissions:
  issues: write               # p/ abrir a Issue de aviso quando conseguir

concurrency:                  # novo disparo REINICIA a caça (não empilha jobs de 5,5h)
  group: hunt
  cancel-in-progress: true

jobs:
  hunt:
    runs-on: ubuntu-latest
    timeout-minutes: 350         # a caça roda ~5,5h (limite do GitHub é 6h)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar SDK da Oracle
        run: pip install --quiet --disable-pip-version-check -r requirements.txt

      - name: Tentar criar a VM (2 tamanhos x 4 dominios)
        id: try
        continue-on-error: true      # "sem vaga" (exit 75) NÃO é falha do workflow
        env:
          OCI_USER: ${{ secrets.OCI_USER }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_TENANCY: ${{ secrets.OCI_TENANCY }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_KEY: ${{ secrets.OCI_KEY }}
          OCI_SUBNET: ${{ secrets.OCI_SUBNET }}
          OCI_AD: ${{ secrets.OCI_AD }}
        run: python hunter.py

      - name: 🎉 Avisar por Issue quando conseguir
        if: steps.try.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const vm = fs.existsSync('vm.txt') ? fs.readFileSync('vm.txt', 'utf8').trim() : '(sem OCID)';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🎉 VM Oracle ARM conseguida!',
              body: [
                'A vaga abriu e a VM **foi criada**.',
                '',
                `**OCID:** \`${vm}\``,
                '',
                '### Próximos passos',
                '1. Pegar o **IP público** no console da Oracle (Compute → Instances → `lm-bi`)',
                '2. Rodar o **QUICK DEPLOY** do `DEPLOY.md` (repo `hublm/LM_BI`)',
                '3. Migrar o BI do Streamlit Cloud pra ela (12 GB de RAM = fim do aperto de memória)',
                '',
                '_Depois disso, pode **desativar este workflow** — a caça acabou._'
              ].join('\n')
            });

      - name: Desligar o agendamento (ja conseguimos)
        if: steps.try.outcome == 'success'
        run: echo "::notice::VM criada — desative o cron deste workflow para parar a caça."
